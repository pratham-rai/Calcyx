<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calcyx</title>
  <script>
    // GitHub Pages SPA redirect trick
    // When GitHub 404s a deep path like /Calcyx/calculators/bmi,
    // it serves this 404.html. We encode the path into a query param
    // and redirect to the root index.html which decodes and restores it.
    var l = window.location;
    var segmentCount = 1; // number of path segments to keep (repo name = 1)
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
